# Policy for the researcher agent (remote tool execution via runner)
# Tools are executed out-of-process on a remote runner, so we apply
# stricter timeouts and argument constraints.
rules:
  - id: "web-tools"
    priority: 10
    when:
      action: "tool.invoke"
      tool_ids: ["doc.*", "web.*"]
    then:
      decision: "allow"
      timeout_ms: 30000

  - id: "calculator"
    priority: 20
    when:
      action: "tool.invoke"
      tool_id: "calculator"
      arguments:
        - field: "expression"
          max_length: 256
    then:
      decision: "allow"
      timeout_ms: 5000

  - id: "deny-local-only-tools"
    priority: 90
    when:
      action: "tool.invoke"
      tool_ids: ["shell.*", "fs.*"]
    then:
      decision: "deny"
      reason: "Local-only tools are not available on the remote runner"
