name: rebuno

# Core stack: postgres + kernel (always), explorer (opt-in via --profile)
# For production, set POSTGRES_PASSWORD and other env vars to secure values
#
# Kernel only:
#   docker compose -f deploy/docker-compose.yaml up
# With explorer:
#   docker compose -f deploy/docker-compose.yaml --profile explorer up
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rebuno}
      POSTGRES_USER: ${POSTGRES_USER:-rebuno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rebuno}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "max_connections=100"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rebuno"]
      interval: 5s
      timeout: 5s
      retries: 5

  kernel:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.kernel
    ports:
      - "8080:8080"
    command:
      - "--db-url=postgres://${POSTGRES_USER:-rebuno}:${POSTGRES_PASSWORD:-rebuno}@postgres:5432/${POSTGRES_DB:-rebuno}?sslmode=disable"
      - "--log-format=text"
      - "--log-level=debug"
      - "--policy=/app/policies"
      # - "--bearer-token=your-secret-token"
      # - "--redis-url=redis://localhost:6379"
    volumes:
      # - ./path/to/your/policies:/app/policies:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v0/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  explorer:
    profiles: ["explorer"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile.explorer
    ports:
      - "3000:3000"
    environment:
      KERNEL_URL: http://kernel:8080
      # KERNEL_API_KEY: your-secret-token
    depends_on:
      kernel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
